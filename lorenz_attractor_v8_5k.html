<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Lorenz Flux - High Density Ensemble Lab</title>
    <style>
        body { margin: 0; background: #000; color: #e0e0e0; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; touch-action: none; }
        #diagnostic {
            position: absolute; top: 20px; right: 20px; width: 220px; height: 120px;
            background: rgba(0, 0, 0, 0.8); border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 8px; padding: 10px; pointer-events: none; z-index: 1000;
        }
        #diagCanvas { width: 100%; height: 80%; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .diagLabel { font-size: 8px; text-transform: uppercase; letter-spacing: 1px; color: #00d2ff; margin-bottom: 5px; display: block; }
        #controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 96%; max-width: 1400px; background: rgba(10, 15, 25, 0.92);
            backdrop-filter: blur(15px); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: space-around; align-items: center; 
            z-index: 1001; pointer-events: auto;
        }
        .group { display: flex; flex-direction: column; gap: 6px; min-width: 80px; }
        .label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #fff; font-weight: 800; }
        input[type=range] { -webkit-appearance: none; background: transparent; cursor: pointer; width: 100%; }
        input[type=range]::-webkit-slider-runnable-track { height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #00d2ff; margin-top: -7px; box-shadow: 0 0 12px #00d2ff; }
        input[type=range]:disabled { opacity: 0.2; cursor: default; }
        .btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 6px 8px; border-radius: 4px; cursor: pointer; font-size: 9px; transition: 0.2s; font-weight: 600; min-width: 28px; text-align: center; }
        .btn.active { background: #00d2ff; color: #000; border-color: #00d2ff; box-shadow: 0 0 20px rgba(0, 210, 255, 0.5); }
    </style>
</head>
<body>

<div id="diagnostic">
    <span class="diagLabel">Ensemble Divergence</span>
    <canvas id="diagCanvas"></canvas>
</div>

<div id="controls">
    <div class="group"><span class="label">Observer</span><div style="display:flex; gap:5px;"><button class="btn active" id="b_man" onclick="setAuto(false)">Man</button><button class="btn" id="b_auto" onclick="setAuto(true)">Auto</button></div></div>
    <div class="group"><span class="label">Analysis</span><button class="btn" id="b_slice" onclick="toggleSlice()">Tri-Plane Slice</button></div>
    <div class="group"><span class="label">Visuals</span><div style="display:flex; gap:5px;"><button class="btn" id="b_field" onclick="vField=!vField; this.classList.toggle('active')">Field</button><button class="btn" id="b_blue" onclick="vBlueMode=!vBlueMode; this.classList.toggle('active')">Tri-Blue</button><button class="btn active" id="b_heads" onclick="vHeads=!vHeads; this.classList.toggle('active')">Heads</button></div></div>
    <div class="group"><span class="label">Ensemble</span><div id="pointGrid" style="display:grid; grid-template-columns: repeat(6, 1fr); gap:3px;"></div></div>
    <div class="group" style="flex-grow: 1;"><span class="label">Restless</span><input type="range" min="1" max="35" value="10" oninput="sigma=+this.value"></div>
    <div class="group" style="flex-grow: 1;"><span class="label">Speed</span><input type="range" min="1" max="30" value="12" oninput="masterSpeed=+this.value"></div>
    <div class="group" style="flex-grow: 1;"><span class="label">Trails</span><input type="range" min="0" max="2000" value="1200" oninput="trailLimit=+this.value"></div>
    <div class="group" style="flex-grow: 1;"><span class="label" id="camLabel" style="opacity: 0.2;">Camera</span><input type="range" min="1" max="20" value="10" id="camSlider" oninput="camSpeed=+this.value" disabled></div>
    <div class="group"><button class="btn" onclick="resetPoints()" style="border-color: #00d2ff; color: #00d2ff;">Reset</button></div>
</div>

<canvas id="canvas"></canvas>

<script>
const cv = document.getElementById('canvas'), ctx = cv.getContext('2d');
const dcv = document.getElementById('diagCanvas'), dctx = dcv.getContext('2d');
let W, H, dpr = Math.min(window.devicePixelRatio || 1, 2);
let sigma = 10, rho = 28, beta = 2.67;
let actors = [], activeCount = 1, masterSpeed = 12, camSpeed = 10, trailLimit = 1200;
let rotationX = 0.8, rotationY = 0.4, panX = 0, panY = 0, zoom = 1.0, autoTimer = 0;
let isAuto = false, isDragging = false, isPanning = false, lastX, lastY;
let showSlice = false, vField = false, vBlueMode = false, vHeads = true, poincarePoints = [];
let divergenceData = [];

const baseColors = ['#00d2ff', '#ff007a', '#00ffaa', '#ffcc00', '#9966ff', '#ff6600', '#00ffea', '#ff00ff', '#ccff00', '#ff3300'];
const blueShades = ['#00d2ff', '#0078ff', '#3d5afe'];
let colors = []; for(let i=0; i<5000; i++) colors.push(baseColors[i % baseColors.length]);

function initUI() {
    const grid = document.getElementById('pointGrid');
    const increments = [1, 2, 5, 10, 20, 40, 100, 500, 1000, 2000, 5000];
    increments.forEach(val => {
        const btn = document.createElement('button');
        btn.className = val === 1 ? 'btn active' : 'btn';
        btn.id = 'p' + val; 
        btn.innerText = val >= 1000 ? (val/1000) + 'K' : val;
        btn.onclick = () => setCount(val);
        grid.appendChild(btn);
    });
    dcv.width = 220 * dpr; dcv.height = 80 * dpr;
    const hud = document.getElementById('controls');
    ['mousedown', 'touchstart', 'mousemove', 'touchmove', 'wheel', 'click'].forEach(evt => {
        hud.addEventListener(evt, (e) => e.stopPropagation(), { passive: false });
    });
}

function toggleSlice() { showSlice = !showSlice; document.getElementById('b_slice').classList.toggle('active', showSlice); if (!showSlice) poincarePoints = []; }
function setAuto(v) { isAuto = v; document.getElementById('b_auto').classList.toggle('active', v); document.getElementById('b_man').classList.toggle('active', !v); document.getElementById('camSlider').disabled = !v; document.getElementById('camLabel').style.opacity = v ? "1" : "0.2"; }

function resetPoints() { 
    actors = []; poincarePoints = []; divergenceData = []; 
    for(let i = 0; i < 5000; i++) { 
        actors.push({ 
            x: 0.1 + (i * 0.0001), 
            y: 0, z: 0, lastX: 0.1, lastY: 0, lastZ: 0, 
            points: [], color: colors[i], blueColor: blueShades[i % 3] 
        }); 
    } 
}

function setCount(n) { 
    activeCount = n; 
    document.querySelectorAll('#pointGrid .btn').forEach(btn => {
        btn.classList.toggle('active', btn.id === 'p' + n);
    });
}

function project(x, y, z, currentZoom) {
    const scale = (Math.min(W, H) * 0.015) * currentZoom;
    const tz = z - 27;
    let xR = x * Math.cos(rotationX) - tz * Math.sin(rotationX);
    let zR = x * Math.sin(rotationX) + tz * Math.cos(rotationX);
    let yR = y * Math.cos(rotationY) - zR * Math.sin(rotationY);
    return { sx: (W/2 + panX) + xR * scale, sy: (H/2 + panY) + yR * scale };
}

function drawDivergence() {
    dctx.clearRect(0, 0, dcv.width, dcv.height);
    if (divergenceData.length < 2) return;
    dctx.strokeStyle = '#00d2ff'; dctx.lineWidth = 2 * dpr;
    dctx.beginPath();
    for (let i = 0; i < divergenceData.length; i++) {
        let x = (i / 200) * dcv.width;
        let y = dcv.height - (Math.min(divergenceData[i], 50) / 50) * dcv.height;
        if (i === 0) dctx.moveTo(x, y); else dctx.lineTo(x, y);
    }
    dctx.stroke();
}

function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
    let currentZoom = zoom;
    if (isAuto && !isDragging && !isPanning) {
        let camFactor = camSpeed * 0.00015; autoTimer += camFactor * 10;
        rotationX += camFactor * 10; rotationY = 0.4 + Math.sin(autoTimer * 0.5) * 0.3;
        currentZoom *= (1 + Math.sin(autoTimer) * 0.05);
    }

    if (vField) {
        ctx.lineWidth = 1 * dpr;
        for(let i=-25; i<=25; i+=12.5) {
            for(let j=-25; j<=25; j+=12.5) {
                for(let k=2; k<=52; k+=12.5) {
                    let dx = sigma*(j-i)*0.012, dy = (i*(rho-k)-j)*0.012, dz = (i*j-beta*k)*0.012;
                    let p1 = project(i,j,k, currentZoom), p2 = project(i+dx*3, j+dy*3, k+dz*3, currentZoom);
                    let mag = Math.sqrt(dx*dx + dy*dy + dz*dz) * 15;
                    ctx.strokeStyle = `rgba(0, 255, 255, ${0.03 + Math.min(mag, 0.12)})`;
                    ctx.beginPath(); ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy); ctx.stroke();
                }
            }
        }
    }

    if (showSlice) {
        ctx.strokeStyle = 'rgba(0, 210, 255, 0.45)'; ctx.lineWidth = 1.0 * dpr; ctx.beginPath();
        for(let i=-25; i<=25; i+=5) {
            let p1 = project(-25, i, 27, currentZoom), p2 = project(25, i, 27, currentZoom);
            ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy);
            let p3 = project(i, -25, 27, currentZoom), p4 = project(i, 25, 27, currentZoom);
            ctx.moveTo(p3.sx, p3.sy); ctx.lineTo(p4.sx, p4.sy);
        }
        for(let k=27-25; k<=27+25; k+=5) {
            let p1 = project(0, -25, k, currentZoom), p2 = project(0, 25, k, currentZoom);
            ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy);
        }
        for(let j=-25; j<=25; j+=5) {
            let p1 = project(0, j, 27-25, currentZoom), p2 = project(0, j, 27+25, currentZoom);
            ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy);
        }
        for(let k=27-25; k<=27+25; k+=5) {
            let p1 = project(-25, 0, k, currentZoom), p2 = project(25, 0, k, currentZoom);
            ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy);
        }
        for(let i=-25; i<=25; i+=5) {
            let p1 = project(i, 0, 27-25, currentZoom), p2 = project(i, 0, 27+25, currentZoom);
            ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy);
        }
        ctx.stroke();
    }

    let currentDiv = 0;
    for (let s = 0; s < masterSpeed; s++) {
        let dt = 0.006;
        for (let i = 0; i < activeCount; i++) {
            let a = actors[i];
            let dx = (sigma * (a.y - a.x)) * dt, dy = (a.x * (rho - a.z) - a.y) * dt, dz = (a.x * a.y - beta * a.z) * dt;
            a.lastX = a.x; a.lastY = a.y; a.lastZ = a.z;
            a.x += dx; a.y += dy; a.z += dz;
            a.points.push({x: a.x, y: a.y, z: a.z});
            if (a.points.length > 2000) a.points.shift();
            
            if (showSlice) {
                if ((a.lastZ <= 27 && a.z >= 27) || (a.lastZ >= 27 && a.z <= 27)) poincarePoints.push({x: a.x, y: a.y, z: 27});
                if ((a.lastX <= 0 && a.x >= 0) || (a.lastX >= 0 && a.x <= 0)) poincarePoints.push({x: 0, y: a.y, z: a.z});
                if ((a.lastY <= 0 && a.y >= 0) || (a.lastY >= 0 && a.y <= 0)) poincarePoints.push({x: a.x, y: 0, z: a.z});
                if (poincarePoints.length > 5000) poincarePoints.shift();
            }
        }
        if (activeCount > 1) {
            let sumDist = 0;
            for(let i=1; i<activeCount; i++) sumDist += Math.sqrt(Math.pow(actors[i].x-actors[0].x,2) + Math.pow(actors[i].y-actors[0].y,2) + Math.pow(actors[i].z-actors[0].z,2));
            currentDiv = sumDist / (activeCount - 1);
        }
    }
    divergenceData.push(currentDiv); if (divergenceData.length > 200) divergenceData.shift();
    drawDivergence();

    poincarePoints.forEach(p => {
        let proj = project(p.x, p.y, p.z, currentZoom);
        if(Math.abs(p.x) <= 25 && Math.abs(p.y) <= 25 && p.z >= 2 && p.z <= 52) {
            ctx.fillStyle = '#fff'; ctx.fillRect(proj.sx, proj.sy, 1.5*dpr, 1.5*dpr);
        }
    });

    actors.slice(0, activeCount).forEach(actor => {
        if (trailLimit > 0 && actor.points.length >= 2) {
            const startIdx = Math.max(0, actor.points.length - trailLimit);
            for (let i = startIdx; i < actor.points.length - 1; i++) {
                let p1 = actor.points[i], p2 = actor.points[i+1];
                let proj1 = project(p1.x, p1.y, p1.z, currentZoom), proj2 = project(p2.x, p2.y, p2.z, currentZoom);
                let tailProgress = (i - startIdx) / (actor.points.length - startIdx);
                ctx.strokeStyle = (vBlueMode ? actor.blueColor : actor.color);
                ctx.lineWidth = (0.1 + Math.pow(tailProgress, 2.5) * 0.6) * dpr;
                ctx.beginPath(); ctx.moveTo(proj1.sx, proj1.sy); ctx.lineTo(proj2.sx, proj2.sy); ctx.stroke();
            }
        }
        if (vHeads) {
            let head = actor.points[actor.points.length - 1];
            let hproj = project(head.x, head.y, head.z, currentZoom);
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(hproj.sx, hproj.sy, 1.5*dpr, 0, Math.PI*2); ctx.fill();
        }
    });
    requestAnimationFrame(draw);
}

function resize() { W = cv.width = window.innerWidth * dpr; H = cv.height = window.innerHeight * dpr; }
window.addEventListener('resize', resize);
window.addEventListener('mousedown', e => { if (e.target.id !== 'canvas') return; lastX = e.clientX; lastY = e.clientY; if (e.button === 2 || e.ctrlKey) isPanning = true; else isDragging = true; });
window.addEventListener('mousemove', e => { if (!isDragging && !isPanning) return; let dx = e.clientX - lastX, dy = e.clientY - lastY; if (isDragging) { rotationX += dx * 0.007; rotationY += dy * 0.007; } else if (isPanning) { panX += dx * dpr; panY += dy * dpr; } lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mouseup', () => { isDragging = false; isPanning = false; });
cv.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('wheel', e => { if (e.target.id !== 'canvas') return; zoom *= e.deltaY > 0 ? 0.9 : 1.1; e.preventDefault(); }, {passive:false});
initUI(); resize(); resetPoints(); draw();
</script>
</body>
</html>
