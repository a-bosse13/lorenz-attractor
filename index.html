<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Lorenz Flux - High Density Ensemble Lab</title>
    <style>
        body { margin: 0; background: #000; color: #e0e0e0; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; touch-action: none; }
        
        #diagnostic {
            position: absolute; top: 10px; right: 10px; width: 160px; height: 100px;
            background: rgba(0, 0, 0, 0.8); border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 8px; padding: 8px; pointer-events: none; z-index: 1000;
        }
        
        #diagCanvas { width: 100%; height: 75%; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .diagLabel { font-size: 7px; text-transform: uppercase; letter-spacing: 1px; color: #00d2ff; margin-bottom: 4px; display: block; }
        
        #controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 1200px; background: rgba(10, 15, 25, 0.9);
            backdrop-filter: blur(10px); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px; display: flex; flex-wrap: nowrap; gap: 20px; justify-content: flex-start; align-items: center; 
            z-index: 1001; pointer-events: auto; overflow-x: auto; -webkit-overflow-scrolling: touch;
        }
        
        #controls::-webkit-scrollbar { display: none; }

        .group { display: flex; flex-direction: column; gap: 4px; min-width: 100px; flex-shrink: 0; }
        .label { font-size: 8px; text-transform: uppercase; letter-spacing: 1px; color: #fff; font-weight: 800; }
        
        input[type=range] { -webkit-appearance: none; background: transparent; cursor: pointer; width: 100%; }
        input[type=range]::-webkit-slider-runnable-track { height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #00d2ff; margin-top: -8px; box-shadow: 0 0 10px #00d2ff; }
        
        .btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 9px; font-weight: 600; text-align: center; }
        .btn.active { background: #00d2ff; color: #000; border-color: #00d2ff; }

        #canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
    </style>
</head>
<body>

<div id="diagnostic">
    <span class="diagLabel">Ensemble Divergence</span>
    <canvas id="diagCanvas"></canvas>
</div>

<div id="controls">
    <div class="group"><span class="label">Observer</span><div style="display:flex; gap:5px;"><button class="btn active" id="b_man" onclick="setAuto(false)">Man</button><button class="btn" id="b_auto" onclick="setAuto(true)">Auto</button></div></div>
    <div class="group"><span class="label">Analysis</span><button class="btn" id="b_slice" onclick="toggleSlice()">Slice</button></div>
    <div class="group"><span class="label">Visuals</span><div style="display:flex; gap:4px;"><button class="btn" onclick="vField=!vField; this.classList.toggle('active')">Field</button><button class="btn" onclick="vBlueMode=!vBlueMode; this.classList.toggle('active')">Blue</button></div></div>
    <div class="group"><span class="label">Ensemble</span><div id="pointGrid" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:2px;"></div></div>
    <div class="group"><span class="label">Restless</span><input type="range" min="1" max="35" value="10" oninput="sigma=+this.value"></div>
    <div class="group"><span class="label">Speed</span><input type="range" min="1" max="30" value="12" oninput="masterSpeed=+this.value"></div>
    <div class="group"><button class="btn" onclick="resetPoints()" style="border-color: #00d2ff; color: #00d2ff;">Reset</button></div>
</div>

<canvas id="canvas"></canvas>

<script>
const cv = document.getElementById('canvas'), ctx = cv.getContext('2d');
const dcv = document.getElementById('diagCanvas'), dctx = dcv.getContext('2d');
let W, H, dpr = Math.min(window.devicePixelRatio || 1, 2);
let sigma = 10, rho = 28, beta = 2.67;
let actors = [], activeCount = 1, masterSpeed = 12, camSpeed = 10, trailLimit = 1200;

// Camera defaults
let rotationX = 0, rotationY = 0, panX = 0, panY = 0, zoom = 1.0, autoTimer = 0;
let isAuto = false, isDragging = false, lastX, lastY;
let showSlice = false, vField = false, vBlueMode = false, vHeads = true, poincarePoints = [];
let divergenceData = [];

const baseColors = ['#00d2ff', '#ff007a', '#00ffaa', '#ffcc00', '#9966ff', '#ff6600'];
const blueShades = ['#00d2ff', '#0078ff', '#3d5afe'];
let colors = []; for(let i=0; i<5000; i++) colors.push(baseColors[i % baseColors.length]);

function initUI() {
    const grid = document.getElementById('pointGrid');
    [1, 10, 100, 1000].forEach(val => {
        const btn = document.createElement('button');
        btn.className = val === 1 ? 'btn active' : 'btn';
        btn.id = 'p' + val; btn.innerText = val >= 1000 ? (val/1000) + 'K' : val;
        btn.onclick = () => setCount(val);
        grid.appendChild(btn);
    });
    dcv.width = 160 * dpr; dcv.height = 75 * dpr;
}

function toggleSlice() { showSlice = !showSlice; if (!showSlice) poincarePoints = []; }
function setAuto(v) { isAuto = v; }
function setCount(n) { activeCount = n; document.querySelectorAll('#pointGrid .btn').forEach(b => b.classList.toggle('active', b.id === 'p'+n)); }

function resetPoints() { 
    actors = []; poincarePoints = []; divergenceData = []; 
    for(let i = 0; i < 5000; i++) { 
        actors.push({ x: 0.1 + (i * 0.0001), y: 0, z: 0, lastX: 0.1, lastY: 0, lastZ: 0, points: [], color: colors[i], blueColor: blueShades[i % 3] }); 
    } 
}

function project(x, y, z, currentZoom) {
    const scale = (Math.min(W, H) * 0.015) * currentZoom;
    const tz = z - 27; 
    let xR = x * Math.cos(rotationX) - tz * Math.sin(rotationX);
    let zR = x * Math.sin(rotationX) + tz * Math.cos(rotationX);
    let yR = y * Math.cos(rotationY) - zR * Math.sin(rotationY);
    return { sx: (W/2) + (panX * dpr) + (xR * scale), sy: (H/2) + (panY * dpr) + (yR * scale) };
}

function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
    let currentZoom = zoom;
    if (isAuto && !isDragging) {
        rotationX += 0.005; rotationY = 0.4 + Math.sin(autoTimer += 0.01) * 0.2;
    }

    for (let s = 0; s < masterSpeed; s++) {
        let dt = 0.006;
        for (let i = 0; i < activeCount; i++) {
            let a = actors[i];
            let dx = (sigma * (a.y - a.x)) * dt, dy = (a.x * (rho - a.z) - a.y) * dt, dz = (a.x * a.y - beta * a.z) * dt;
            a.lastX = a.x; a.lastZ = a.z; a.x += dx; a.y += dy; a.z += dz;
            a.points.push({x: a.x, y: a.y, z: a.z});
            if (a.points.length > 1000) a.points.shift();
        }
    }

    actors.slice(0, activeCount).forEach(actor => {
        if (actor.points.length < 2) return;
        ctx.strokeStyle = vBlueMode ? actor.blueColor : actor.color;
        ctx.lineWidth = 1 * dpr;
        ctx.beginPath();
        let pStart = project(actor.points[0].x, actor.points[0].y, actor.points[0].z, currentZoom);
        ctx.moveTo(pStart.sx, pStart.sy);
        for(let i=1; i<actor.points.length; i++) {
            let p = project(actor.points[i].x, actor.points[i].y, actor.points[i].z, currentZoom);
            ctx.lineTo(p.sx, p.sy);
        }
        ctx.stroke();
    });
    requestAnimationFrame(draw);
}

function resize() { W = cv.width = window.innerWidth * dpr; H = cv.height = window.innerHeight * dpr; panX=0; panY=0; }

// MOBILE TOUCH HANDLERS
cv.addEventListener('touchstart', e => {
    const t = e.touches[0];
    lastX = t.clientX; lastY = t.clientY;
    isDragging = true;
}, { passive: false });

cv.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const t = e.touches[0];
    rotationX += (t.clientX - lastX) * 0.01;
    rotationY += (t.clientY - lastY) * 0.01;
    lastX = t.clientX; lastY = t.clientY;
    e.preventDefault();
}, { passive: false });

window.addEventListener('touchend', () => isDragging = false);

// MOUSE HANDLERS
cv.addEventListener('mousedown', e => { lastX = e.clientX; lastY = e.clientY; isDragging = true; });
window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    rotationX += (e.clientX - lastX) * 0.007;
    rotationY += (e.clientY - lastY) * 0.007;
    lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('mouseup', () => isDragging = false);

window.addEventListener('resize', resize);
initUI(); resize(); resetPoints(); draw();
</script>
</body>
</html>
