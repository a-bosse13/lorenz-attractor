<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Lorenz Flux - Mobile Optimized</title>
    <style>
        body { margin: 0; background: #000; color: #e0e0e0; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; touch-action: none; }
        
        #controls {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 1200px; background: rgba(10, 15, 25, 0.9);
            backdrop-filter: blur(10px); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px; display: flex; flex-wrap: nowrap; gap: 15px; justify-content: flex-start; align-items: center; 
            z-index: 1001; pointer-events: auto; overflow-x: auto; -webkit-overflow-scrolling: touch;
        }
        #controls::-webkit-scrollbar { display: none; }

        /* Mobile D-Pad & Zoom Styles */
        #mobileNav {
            display: none; position: absolute; top: 20px; left: 20px; 
            flex-direction: column; gap: 10px; z-index: 1005;
        }
        .dpad { display: grid; grid-template-columns: repeat(3, 45px); grid-template-rows: repeat(2, 45px); gap: 5px; }
        .zoom-controls { display: flex; flex-direction: column; gap: 5px; }
        
        @media (max-width: 800px) { #mobileNav { display: flex; } }

        .nav-btn { 
            background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(0, 210, 255, 0.4);
            color: #00d2ff; border-radius: 8px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
            user-select: none; width: 45px; height: 45px;
        }
        .nav-btn:active { background: #00d2ff; color: #000; }

        .group { display: flex; flex-direction: column; gap: 4px; min-width: 100px; flex-shrink: 0; }
        .label { font-size: 8px; text-transform: uppercase; letter-spacing: 1px; color: #fff; font-weight: 800; }
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]::-webkit-slider-runnable-track { height: 4px; background: rgba(255,255,255,0.2); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #00d2ff; margin-top: -8px; }
        
        .btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 9px; font-weight: 600; }
        .btn.active { background: #00d2ff; color: #000; }
        #canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="mobileNav">
    <div class="dpad">
        <div style="grid-column: 2"><button class="nav-btn" onpointerdown="startMove(0, -10)" onpointerup="stopMove()">↑</button></div>
        <button class="nav-btn" onpointerdown="startMove(-10, 0)" onpointerup="stopMove()">←</button>
        <button class="nav-btn" onpointerdown="startMove(0, 10)" onpointerup="stopMove()">↓</button>
        <button class="nav-btn" onpointerdown="startMove(10, 0)" onpointerup="stopMove()">→</button>
    </div>
    <div class="zoom-controls">
        <button class="nav-btn" style="width: 100%" onpointerdown="startZoom(1.05)" onpointerup="stopZoom()">+</button>
        <button class="nav-btn" style="width: 100%" onpointerdown="startZoom(0.95)" onpointerup="stopZoom()">-</button>
    </div>
</div>

<div id="controls">
    <div class="group"><span class="label">Auto-Cam</span><button class="btn" id="b_auto" onclick="isAuto=!isAuto; this.classList.toggle('active')">Toggle</button></div>
    <div class="group"><span class="label">Ensemble</span><div id="pointGrid" style="display:grid; grid-template-columns: repeat(2, 1fr); gap:4px;"></div></div>
    <div class="group"><span class="label">Restless</span><input type="range" min="1" max="35" value="10" oninput="sigma=+this.value"></div>
    <div class="group"><span class="label">Speed</span><input type="range" min="1" max="30" value="12" oninput="masterSpeed=+this.value"></div>
    <div class="group"><button class="btn" onclick="resetPoints()" style="border-color: #00d2ff; color: #00d2ff;">Reset</button></div>
</div>

<canvas id="canvas"></canvas>

<script>
const cv = document.getElementById('canvas'), ctx = cv.getContext('2d');
let W, H, dpr = Math.min(window.devicePixelRatio || 1, 2);
let sigma = 10, rho = 28, beta = 2.67;
let actors = [], activeCount = 1, masterSpeed = 12;

let rotationX = 0, rotationY = 0.5, panX = 0, panY = 0, zoom = 1.0;
let isAuto = false, isDragging = false, lastX, lastY;
let moveInterval, zoomInterval;

const colors = ['#00d2ff', '#ff007a', '#00ffaa', '#ffcc00', '#9966ff', '#ff6600'];

function startMove(x, y) { moveInterval = setInterval(() => { panX += x; panY += y; }, 16); }
function stopMove() { clearInterval(moveInterval); }
function startZoom(factor) { zoomInterval = setInterval(() => { zoom *= factor; }, 16); }
function stopZoom() { clearInterval(zoomInterval); }

function initUI() {
    const grid = document.getElementById('pointGrid');
    [1, 10, 100, 1000].forEach(val => {
        const btn = document.createElement('button');
        btn.className = val === 1 ? 'btn active' : 'btn';
        btn.id = 'p' + val; btn.innerText = val >= 1000 ? (val/1000) + 'K' : val;
        btn.onclick = () => { activeCount = val; document.querySelectorAll('#pointGrid .btn').forEach(b => b.classList.toggle('active', b.id === 'p'+val)); };
        grid.appendChild(btn);
    });
}

function resetPoints() { 
    actors = []; 
    for(let i = 0; i < 5000; i++) { 
        actors.push({ x: 0.1 + (i * 0.0001), y: 0, z: 0, points: [], color: colors[i % 6] }); 
    } 
}

function project(x, y, z) {
    const scale = (Math.min(W, H) * 0.015) * zoom;
    const tz = z - 27; 
    let xR = x * Math.cos(rotationX) - tz * Math.sin(rotationX);
    let zR = x * Math.sin(rotationX) + tz * Math.cos(rotationX);
    let yR = y * Math.cos(rotationY) - zR * Math.sin(rotationY);
    // Applying Pan directly to screen coordinates
    return { sx: (W/2) + (panX * dpr) + (xR * scale), sy: (H/2) + (panY * dpr) + (yR * scale) };
}

function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
    if (isAuto && !isDragging) { rotationX += 0.005; }

    for (let s = 0; s < masterSpeed; s++) {
        let dt = 0.006;
        for (let i = 0; i < activeCount; i++) {
            let a = actors[i];
            let dx = (sigma * (a.y - a.x)) * dt, dy = (a.x * (rho - a.z) - a.y) * dt, dz = (a.x * a.y - beta * a.z) * dt;
            a.x += dx; a.y += dy; a.z += dz;
            a.points.push({x: a.x, y: a.y, z: a.z});
            if (a.points.length > 800) a.points.shift();
        }
    }

    actors.slice(0, activeCount).forEach(actor => {
        if (actor.points.length < 2) return;
        ctx.strokeStyle = actor.color;
        ctx.lineWidth = 1.2 * dpr;
        ctx.beginPath();
        let pStart = project(actor.points[0].x, actor.points[0].y, actor.points[0].z);
        ctx.moveTo(pStart.sx, pStart.sy);
        for(let i=1; i<actor.points.length; i+=2) { // Step 2 for performance
            let p = project(actor.points[i].x, actor.points[i].y, actor.points[i].z);
            ctx.lineTo(p.sx, p.sy);
        }
        ctx.stroke();
    });
    requestAnimationFrame(draw);
}

function resize() { W = cv.width = window.innerWidth * dpr; H = cv.height = window.innerHeight * dpr; }

// Interactions
cv.addEventListener('touchstart', e => { lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; isDragging = true; }, { passive: false });
cv.addEventListener('touchmove', e => {
    if (!isDragging) return;
    rotationX += (e.touches[0].clientX - lastX) * 0.008;
    rotationY += (e.touches[0].clientY - lastY) * 0.008;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    e.preventDefault();
}, { passive: false });
window.addEventListener('touchend', () => isDragging = false);

cv.addEventListener('mousedown', e => { lastX = e.clientX; lastY = e.clientY; isDragging = true; });
window.addEventListener('mousemove', e => { if (isDragging) { rotationX += (e.clientX - lastX) * 0.007; rotationY += (e.clientY - lastY) * 0.007; lastX = e.clientX; lastY = e.clientY; } });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('wheel', e => { zoom *= e.deltaY > 0 ? 0.9 : 1.1; e.preventDefault(); }, {passive:false});

window.addEventListener('resize', resize);
initUI(); resize(); resetPoints(); draw();
</script>
</body>
</html>
