<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Lorenz Flux - v8_5k Sync</title>
    <style>
        body { margin: 0; background: #000; color: #e0e0e0; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; touch-action: none; }
        
        /* RESTORED: Diagnostic HUD */
        #diagnostic {
            position: absolute; top: 20px; right: 20px; width: 220px; height: 120px;
            background: rgba(0, 0, 0, 0.8); border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 8px; padding: 10px; pointer-events: none; z-index: 1000;
        }
        #diagCanvas { width: 100%; height: 80%; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .diagLabel { font-size: 8px; text-transform: uppercase; letter-spacing: 1px; color: #00d2ff; margin-bottom: 5px; display: block; }

        /* HUD - Adaptive for Mobile/Desktop */
        #controls {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: rgba(10, 15, 25, 0.95); backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px; display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 10px; box-sizing: border-box; z-index: 1001;
        }

        @media (min-width: 900px) {
            #controls { 
                bottom: 20px; left: 50%; transform: translateX(-50%); width: 96%; 
                max-width: 1400px; border: 1px solid rgba(255,255,255,0.2); border-radius: 16px;
                display: flex; flex-wrap: nowrap; justify-content: space-around; align-items: center;
            }
            #mobileNav { display: none !important; }
        }

        /* Mobile D-Pad Restoration */
        #mobileNav {
            position: absolute; top: 15px; left: 15px; 
            display: flex; flex-direction: column; gap: 8px; z-index: 1005;
        }
        .dpad { display: grid; grid-template-columns: repeat(3, 40px); grid-template-rows: repeat(2, 40px); gap: 4px; }
        .nav-btn { 
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(0, 210, 255, 0.3);
            color: #00d2ff; border-radius: 6px; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        .group { display: flex; flex-direction: column; gap: 4px; min-width: 80px; }
        .label { font-size: 8px; text-transform: uppercase; letter-spacing: 1px; color: #fff; font-weight: 800; }
        
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]::-webkit-slider-runnable-track { height: 4px; background: rgba(255,255,255,0.3); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #00d2ff; margin-top: -7px; }
        input[type=range]:disabled { opacity: 0.2; }

        .btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 6px 8px; border-radius: 4px; cursor: pointer; font-size: 9px; font-weight: 600; text-align: center; }
        .btn.active { background: #00d2ff; color: #000; border-color: #00d2ff; box-shadow: 0 0 15px rgba(0,210,255,0.4); }
    </style>
</head>
<body>

<div id="diagnostic">
    <span class="diagLabel">Ensemble Divergence</span>
    <canvas id="diagCanvas"></canvas>
</div>

<div id="mobileNav">
    <div class="dpad">
        <div style="grid-column: 2"><button class="nav-btn" onpointerdown="startMove(0, -8)" onpointerup="stopMove()">↑</button></div>
        <button class="nav-btn" onpointerdown="startMove(-8, 0)" onpointerup="stopMove()">←</button>
        <button class="nav-btn" onpointerdown="startMove(0, 8)" onpointerup="stopMove()">↓</button>
        <button class="nav-btn" onpointerdown="startMove(8, 0)" onpointerup="stopMove()">→</button>
    </div>
    <div style="display: flex; gap: 4px;">
        <button class="nav-btn" onpointerdown="startZoom(1.03)" onpointerup="stopZoom()">+</button>
        <button class="nav-btn" onpointerdown="startZoom(0.97)" onpointerup="stopZoom()">-</button>
    </div>
</div>

<div id="controls">
    <div class="group"><span class="label">Observer</span><div style="display:flex; gap:5px;"><button class="btn active" id="b_man" onclick="setAuto(false)">Man</button><button class="btn" id="b_auto" onclick="setAuto(true)">Auto</button></div></div>
    <div class="group"><span class="label">Analysis</span><button class="btn" id="b_slice" onclick="toggleSlice()">Tri-Plane Slice</button></div>
    <div class="group"><span class="label">Visuals</span><div style="display:flex; gap:4px;"><button class="btn" id="b_field" onclick="vField=!vField; this.classList.toggle('active')">Field</button><button class="btn" id="b_blue" onclick="vBlueMode=!vBlueMode; this.classList.toggle('active')">Tri-Blue</button><button class="btn active" id="b_heads" onclick="vHeads=!vHeads; this.classList.toggle('active')">Heads</button></div></div>
    <div class="group"><span class="label">Ensemble</span><div id="pointGrid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:3px;"></div></div>
    <div class="group"><span class="label">Restless</span><input type="range" min="1" max="35" value="10" oninput="sigma=+this.value"></div>
    <div class="group"><span class="label">Speed</span><input type="range" min="1" max="30" value="12" oninput="masterSpeed=+this.value"></div>
    <div class="group"><span class="label">Trails</span><input type="range" min="0" max="2000" value="1200" oninput="trailLimit=+this.value"></div>
    <div class="group"><span class="label" id="camLabel" style="opacity:0.2;">Camera</span><input type="range" min="1" max="20" value="10" id="camSlider" oninput="camSpeed=+this.value" disabled></div>
    <div class="group"><button class="btn" onclick="resetPoints()" style="border-color: #00d2ff; color: #00d2ff; font-weight:bold;">RESET</button></div>
</div>

<canvas id="canvas"></canvas>

<script>
const cv = document.getElementById('canvas'), ctx = cv.getContext('2d');
const dcv = document.getElementById('diagCanvas'), dctx = dcv.getContext('2d');
let W, H, dpr = Math.min(window.devicePixelRatio || 1, 2);
let sigma = 10, rho = 28, beta = 2.67;
let actors = [], activeCount = 1, masterSpeed = 12, camSpeed = 10, trailLimit = 1200;
let rotationX = 0.8, rotationY = 0.4, panX = 0, panY = 0, zoom = 1.0, autoTimer = 0;
let isAuto = false, isDragging = false, isPanning = false, lastX, lastY, moveInterval, zoomInterval;
let showSlice = false, vField = false, vBlueMode = false, vHeads = true, poincarePoints = [];
let divergenceData = [];

const baseColors = ['#00d2ff', '#ff007a', '#00ffaa', '#ffcc00', '#9966ff', '#ff6600', '#00ffea', '#ff00ff', '#ccff00', '#ff3300'];
const blueShades = ['#00d2ff', '#0078ff', '#3d5afe'];
let colors = []; for(let i=0; i<5000; i++) colors.push(baseColors[i % baseColors.length]);

function startMove(x, y) { moveInterval = setInterval(() => { panX += x; panY += y; }, 16); }
function stopMove() { clearInterval(moveInterval); }
function startZoom(f) { zoomInterval = setInterval(() => { zoom *= f; }, 16); }
function stopZoom() { clearInterval(zoomInterval); }

function initUI() {
    const grid = document.getElementById('pointGrid');
    const increments = [1, 10, 100, 1000, 2500, 5000];
    increments.forEach(val => {
        const btn = document.createElement('button');
        btn.className = val === 1 ? 'btn active' : 'btn';
        btn.id = 'p' + val; btn.innerText = val >= 1000 ? (val/1000) + 'K' : val;
        btn.onclick = () => setCount(val);
        grid.appendChild(btn);
    });
    dcv.width = 220 * dpr; dcv.height = 80 * dpr;
}

function toggleSlice() { showSlice = !showSlice; document.getElementById('b_slice').classList.toggle('active', showSlice); if (!showSlice) poincarePoints = []; }
function setAuto(v) { 
    isAuto = v; 
    document.getElementById('b_auto').classList.toggle('active', v); 
    document.getElementById('b_man').classList.toggle('active', !v); 
    document.getElementById('camSlider').disabled = !v;
    document.getElementById('camLabel').style.opacity = v ? "1" : "0.2";
}

function resetPoints() { 
    actors = []; poincarePoints = []; divergenceData = []; 
    for(let i = 0; i < 5000; i++) { 
        actors.push({ 
            x: 0.1 + (i * 0.0001), y: 0, z: 0, lastX: 0.1, lastY: 0, lastZ: 0, 
            points: [], color: colors[i], blueColor: blueShades[i % 3] 
        }); 
    } 
}

function setCount(n) { 
    activeCount = n; 
    document.querySelectorAll('#pointGrid .btn').forEach(btn => btn.classList.toggle('active', btn.id === 'p' + n));
}

function project(x, y, z, currentZoom) {
    const scale = (Math.min(W, H) * 0.015) * currentZoom;
    const tz = z - 27;
    let xR = x * Math.cos(rotationX) - tz * Math.sin(rotationX);
    let zR = x * Math.sin(rotationX) + tz * Math.cos(rotationX);
    let yR = y * Math.cos(rotationY) - zR * Math.sin(rotationY);
    return { sx: (W/2 + panX * dpr) + xR * scale, sy: (H/2 + panY * dpr) + yR * scale };
}

function drawDivergence() {
    dctx.clearRect(0, 0, dcv.width, dcv.height);
    if (divergenceData.length < 2) return;
    dctx.strokeStyle = '#00d2ff'; dctx.lineWidth = 2 * dpr; dctx.beginPath();
    for (let i = 0; i < divergenceData.length; i++) {
        let x = (i / 200) * dcv.width, y = dcv.height - (Math.min(divergenceData[i], 50) / 50) * dcv.height;
        if (i === 0) dctx.moveTo(x, y); else dctx.lineTo(x, y);
    }
    dctx.stroke();
}

function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
    let currentZoom = zoom;
    if (isAuto && !isDragging && !isPanning) {
        let camFactor = camSpeed * 0.00015; autoTimer += camFactor * 10;
        rotationX += camFactor * 10; rotationY = 0.4 + Math.sin(autoTimer * 0.5) * 0.3;
        currentZoom *= (1 + Math.sin(autoTimer) * 0.05);
    }

    if (vField) {
        ctx.lineWidth = 1 * dpr;
        for(let i=-25; i<=25; i+=12.5) {
            for(let j=-25; j<=25; j+=12.5) {
                for(let k=2; k<=52; k+=12.5) {
                    let dx = sigma*(j-i)*0.012, dy = (i*(rho-k)-j)*0.012, dz = (i*j-beta*k)*0.012;
                    let p1 = project(i,j,k, currentZoom), p2 = project(i+dx*3, j+dy*3, k+dz*3, currentZoom);
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.08)';
                    ctx.beginPath(); ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy); ctx.stroke();
                }
            }
        }
    }

    if (showSlice) {
        ctx.strokeStyle = 'rgba(0, 210, 255, 0.45)'; ctx.lineWidth = 1.0 * dpr; ctx.beginPath();
        for(let i=-25; i<=25; i+=5) {
            let p1 = project(-25, i, 27, currentZoom), p2 = project(25, i, 27, currentZoom);
            ctx.moveTo(p1.sx, p1.sy); ctx.lineTo(p2.sx, p2.sy);
            let p3 = project(i, -25, 27, currentZoom), p4 = project(i, 25, 27, currentZoom);
            ctx.moveTo(p3.sx, p3.sy); ctx.lineTo(p4.sx, p4.sy);
            let pXZ1 = project(i, 0, 2, currentZoom), pXZ2 = project(i, 0, 52, currentZoom);
            ctx.moveTo(pXZ1.sx, pXZ1.sy); ctx.lineTo(pXZ2.sx, pXZ2.sy);
            let pYZ1 = project(0, i, 2, currentZoom), pYZ2 = project(0, i, 52, currentZoom);
            ctx.moveTo(pYZ1.sx, pYZ1.sy); ctx.lineTo(pYZ2.sx, pYZ2.sy);
        }
        ctx.stroke();
    }

    let currentDiv = 0;
    for (let s = 0; s < masterSpeed; s++) {
        let dt = 0.006;
        for (let i = 0; i < activeCount; i++) {
            let a = actors[i];
            let dx = (sigma * (a.y - a.x)) * dt, dy = (a.x * (rho - a.z) - a.y) * dt, dz = (a.x * a.y - beta * a.z) * dt;
            a.lastX = a.x; a.lastY = a.y; a.lastZ = a.z;
            a.x += dx; a.y += dy; a.z += dz;
            a.points.push({x: a.x, y: a.y, z: a.z});
            if (a.points.length > 800) a.points.shift();
            if (showSlice) {
                if ((a.lastZ <= 27 && a.z >= 27) || (a.lastZ >= 27 && a.z <= 27)) poincarePoints.push({x: a.x, y: a.y, z: 27});
                if ((a.lastX <= 0 && a.x >= 0) || (a.lastX >= 0 && a.x <= 0)) poincarePoints.push({x: 0, y: a.y, z: a.z});
                if ((a.lastY <= 0 && a.y >= 0) || (a.lastY >= 0 && a.y <= 0)) poincarePoints.push({x: a.x, y: 0, z: a.z});
            }
        }
        if (activeCount > 1) {
            let sumDist = 0;
            for(let i=1; i<activeCount; i++) sumDist += Math.sqrt(Math.pow(actors[i].x-actors[0].x,2) + Math.pow(actors[i].y-actors[0].y,2) + Math.pow(actors[i].z-actors[0].z,2));
            currentDiv = sumDist / (activeCount - 1);
        }
    }
    divergenceData.push(currentDiv); if (divergenceData.length > 200) divergenceData.shift();
    drawDivergence();

    poincarePoints.forEach(p => {
        let proj = project(p.x, p.y, p.z, currentZoom);
        ctx.fillStyle = '#fff'; ctx.fillRect(proj.sx, proj.sy, 1.5*dpr, 1.5*dpr);
    });
    if (poincarePoints.length > 5000) poincarePoints.shift();

    actors.slice(0, activeCount).forEach(actor => {
        if (trailLimit > 0 && actor.points.length >= 2) {
            const startIdx = Math.max(0, actor.points.length - trailLimit);
            for (let i = startIdx; i < actor.points.length - 1; i++) {
                let p1 = actor.points[i], p2 = actor.points[i+1];
                let proj1 = project(p1.x, p1.y, p1.z, currentZoom), proj2 = project(p2.x, p2.y, p2.z, currentZoom);
                ctx.strokeStyle = vBlueMode ? actor.blueColor : actor.color;
                ctx.lineWidth = (0.1 + Math.pow((i - startIdx) / (actor.points.length - startIdx), 2.5) * 0.6) * dpr;
                ctx.beginPath(); ctx.moveTo(proj1.sx, proj1.sy); ctx.lineTo(proj2.sx, proj2.sy); ctx.stroke();
            }
        }
        if (vHeads) {
            let h = actor.points[actor.points.length-1], hp = project(h.x, h.y, h.z, currentZoom);
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(hp.sx, hp.sy, 1.5*dpr, 0, Math.PI*2); ctx.fill();
        }
    });
    requestAnimationFrame(draw);
}

function resize() { W = cv.width = window.innerWidth * dpr; H = cv.height = window.innerHeight * dpr; }
cv.addEventListener('touchstart', e => { lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; isDragging = true; }, { passive: false });
cv.addEventListener('touchmove', e => {
    if (!isDragging) return;
    rotationX += (e.touches[0].clientX - lastX) * 0.008; rotationY += (e.touches[0].clientY - lastY) * 0.008;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; e.preventDefault();
}, { passive: false });
window.addEventListener('touchend', () => isDragging = false);
cv.addEventListener('mousedown', e => { lastX = e.clientX; lastY = e.clientY; if (e.button === 2 || e.ctrlKey) isPanning = true; else isDragging = true; });
window.addEventListener('mousemove', e => { if (isDragging) { rotationX += (e.clientX - lastX) * 0.007; rotationY += (e.clientY - lastY) * 0.007; } else if (isPanning) { panX += (e.clientX - lastX); panY += (e.clientY - lastY); } lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mouseup', () => { isDragging = false; isPanning = false; });
window.addEventListener('resize', resize);
initUI(); resize(); resetPoints(); draw();
</script>
</body>
</html>
